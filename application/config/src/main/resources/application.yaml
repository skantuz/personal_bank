app:
  http:
    auth-header: Authorization
  name: personal_bank
  version: 1.0.0
  description: Personal Bank Application
##Spring Configuration
server:
  port: 8080
  context-path: /v1/personal_bank
spring:
  application:
    name: personal_bank
  devtools:
    add-properties: false
  r2dbc:
    url: ${db-url}
    username: ${db-user}
    password: ${db-password}
    pool:
      enabled: true
      initial-size: 10
      max-size: 50
      max-idle-time: 0m
      validation-query: SELECT 1
