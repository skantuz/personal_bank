spring:
  application:
    name: personal-bank
  datasource:
    url: jdbc:postgresql://localhost:5432/personal_bank
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  security:
    user:
      name: admin
      password: admin
      roles: ADMIN

server:
  port: 8080

logging:
  level:
    com.personalbank: DEBUG
    org.springframework.security: DEBUG